openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Script Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scripts
    description: Public script browsing
  - name: admin
    description: Owner admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scripts:
    get:
      operationId: listPublishedScripts
      tags: [scripts]
      summary: List all published scripts
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of published scripts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Script"

  /scripts/{id}:
    get:
      operationId: getScript
      tags: [scripts]
      summary: Get a single published script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Script detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
        "404":
          description: Not found

  /scripts/stats:
    get:
      operationId: getScriptStats
      tags: [scripts]
      summary: Get public stats (total scripts, categories)
      responses:
        "200":
          description: Public stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptStats"

  /settings:
    get:
      operationId: getSettings
      tags: [scripts]
      summary: Get public site settings (e.g. Discord URL)
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /admin/settings:
    patch:
      operationId: adminUpdateSettings
      tags: [admin]
      summary: Update site settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
        "401":
          description: Unauthorized

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Owner login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"
        "401":
          description: Invalid password

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Owner logout
      responses:
        "200":
          description: Logged out

  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Check if owner is authenticated
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatus"
        "401":
          description: Not authenticated

  /admin/scripts:
    get:
      operationId: adminListScripts
      tags: [admin]
      summary: List all scripts (including unpublished)
      responses:
        "200":
          description: All scripts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Script"
        "401":
          description: Unauthorized
    post:
      operationId: adminCreateScript
      tags: [admin]
      summary: Create a new script
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScriptInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
        "401":
          description: Unauthorized

  /admin/scripts/{id}:
    patch:
      operationId: adminUpdateScript
      tags: [admin]
      summary: Update a script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScriptUpdate"
      responses:
        "200":
          description: Updated script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: adminDeleteScript
      tags: [admin]
      summary: Delete a script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /admin/scripts/{id}/toggle-publish:
    patch:
      operationId: adminTogglePublish
      tags: [admin]
      summary: Toggle publish status of a script
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated script
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Script"
        "401":
          description: Unauthorized
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Script:
      type: object
      required: [id, title, description, scriptUrl, category, published, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        scriptUrl:
          type: string
        category:
          type: string
        published:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
        imageUrl:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]

    ScriptInput:
      type: object
      required: [title, description, scriptUrl, category]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        scriptUrl:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        published:
          type: boolean
        imageUrl:
          type: string
        tags:
          type: string

    ScriptUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        scriptUrl:
          type: string
        category:
          type: string
        published:
          type: boolean
        imageUrl:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]

    ScriptStats:
      type: object
      required: [totalPublished, categories]
      properties:
        totalPublished:
          type: integer
        categories:
          type: array
          items:
            type: object
            required: [name, count]
            properties:
              name:
                type: string
              count:
                type: integer

    SiteSettings:
      type: object
      required: [discordUrl]
      properties:
        discordUrl:
          type: string

    SiteSettingsInput:
      type: object
      properties:
        discordUrl:
          type: string

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AdminLoginResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    AdminStatus:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
