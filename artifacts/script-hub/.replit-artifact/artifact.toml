kind = "web"
previewPath = "/"
title = "Script Hub"
version = "1.0.0"
id = "artifacts/script-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20444

[services.development]
run = "pnpm --filter @workspace/script-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/script-hub", "run", "build" ]
publicDir = "artifacts/script-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20444"
BASE_PATH = "/"
